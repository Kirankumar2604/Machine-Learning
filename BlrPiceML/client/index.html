<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bengaluru Home Price Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Machine Learning Demo</p>
        <h1>Bengaluru Home Price Predictor</h1>
        <p class="hero-copy">
          Enter location details to estimate market value in seconds.
        </p>
      </header>

      <section class="card card-form">
        <form id="predict-form" class="form-grid">
          <label class="field">
            <span>Location</span>
            <select id="location" required>
              <option value="">Loading locations...</option>
            </select>
          </label>

          <label class="field">
            <span>Total Sqft</span>
            <input id="total_sqft" type="number" min="300" step="1" placeholder="1200" required />
          </label>

          <label class="field">
            <span>Bathrooms</span>
            <input id="bath" type="number" min="1" max="20" step="1" placeholder="2" required />
          </label>

          <label class="field">
            <span>BHK</span>
            <input id="bhk" type="number" min="1" max="20" step="1" placeholder="2" required />
          </label>

          <button id="predict-btn" type="submit">Predict Price</button>
        </form>
      </section>

      <section class="result" aria-live="polite">
        <p class="result-label">Estimated Price</p>
        <p id="price" class="result-value">-</p>
        <p id="status" class="status"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
